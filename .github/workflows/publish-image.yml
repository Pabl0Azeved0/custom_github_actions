name: Publish action image

# The action runs from a prebuilt image (see action.yml). Without this, GitHub rebuilt the
# image on every consumer workflow run — ~15-30s per run, since hosted runners keep no
# layer cache between runs.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "requirements.lock"
      - "src/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:

env:
  # Must stay in sync with `runs.image` in action.yml. Lowercase: GHCR rejects uppercase names.
  IMAGE: ghcr.io/pabl0azeved0/custom_github_actions

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Pinned to commit SHAs, not tags: this job holds packages: write, so a moved tag
      # on a compromised action could publish a backdoored image to every consumer.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4.4.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A newly-disclosed CVE should stop us publishing an image every consumer's CI runs.
      - run: pipx run pip-audit -r requirements.lock

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          push: true
          # `main` is what action.yml pulls; the sha tag makes a run traceable to a commit.
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
